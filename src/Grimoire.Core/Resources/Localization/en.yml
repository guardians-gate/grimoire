    result: "Lore search complete: {0} results."
  about:
    heading: About and attributions
    body: |
      Copyright (c) 2026 Guardian's Gate Games LLC.
      Copyright (c) 2020 VTTAssets.
      Copyright (c) 2020 Jack Holloway.
      Copyright (c) 2012 The Libre Baskerville Project Authors (https://github.com/impallari/Libre-Baskerville).
      Solbera/Ners/Ryrok/LUCASTUCIOUS D&D 5e fonts attribution (CC BY-SA 4.0).
  status:
    placeholder: Operation status will appear here...
    error: "Error: {0}"
    timestampFormat: "HH:mm:ss"
    line: "[{0}] {1}"
